name: "sdk-implementation"
description: "Implements SDK feature in TypeScript and Python with unit tests"
version: "1.0.0"
tags: ["sdk", "implementation", "testing", "typescript", "python"]

# This sub-recipe implements a feature in both SDKs and creates/runs unit tests
# Can be run independently for SDK-only changes

context:
  feature_name: ""          # Required: Name of the feature (e.g., "retry-with-backoff")
  feature_spec: ""          # Required: Detailed feature specification
  workspace_dir: "/Users/mpaidiparthy/repos/amplifier-sdk/amplifier-sdk"

steps:
  - id: "implement-typescript"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Implement the following feature in the TypeScript SDK:
      
      Feature: {{feature_name}}
      Specification: {{feature_spec}}
      
      Working directory: {{workspace_dir}}
      
      Requirements:
      - Follow TypeScript best practices and existing SDK patterns
      - Maintain consistency with existing code style
      - Add proper type definitions
      - Include JSDoc comments for public APIs
      - Handle edge cases and errors appropriately
      
      Implementation should be production-ready and follow the SDK's architectural patterns.
    output: "typescript_implementation"
    timeout: 900

  - id: "implement-python"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Implement the following feature in the Python SDK for parity with TypeScript:
      
      Feature: {{feature_name}}
      Specification: {{feature_spec}}
      
      TypeScript implementation (for reference): {{typescript_implementation}}
      
      Working directory: {{workspace_dir}}
      
      Requirements:
      - Follow Python best practices and PEP 8
      - Maintain consistency with existing SDK patterns
      - Add proper type hints (Python 3.8+)
      - Include docstrings for public APIs
      - Handle edge cases and errors appropriately
      - Ensure feature parity with TypeScript implementation
      
      Implementation should be production-ready and follow the SDK's architectural patterns.
    output: "python_implementation"
    timeout: 900

  - id: "create-unit-tests"
    agent: "foundation:test-coverage"
    prompt: |
      Create comprehensive unit tests for the {{feature_name}} feature in both SDKs.
      
      Feature specification: {{feature_spec}}
      
      TypeScript implementation: {{typescript_implementation}}
      Python implementation: {{python_implementation}}
      
      Working directory: {{workspace_dir}}
      
      Requirements:
      - Create unit tests for TypeScript SDK (Jest framework)
      - Create unit tests for Python SDK (pytest framework)
      - Cover success cases, edge cases, and error conditions
      - Ensure tests follow existing test patterns in the codebase
      - Aim for high code coverage (>90%)
      - Tests should be independent and idempotent
      
      Generate complete, runnable test files.
    output: "unit_tests"
    timeout: 600

  - id: "run-typescript-tests"
    type: "bash"
    command: |
      cd {{workspace_dir}}/typescript
      npm test -- --testPathPattern={{feature_name}}
    output: "typescript_test_results"
    timeout: 300
    on_error: "fail"  # STOP if tests fail - human must review and fix

  - id: "run-python-tests"
    type: "bash"
    command: |
      cd {{workspace_dir}}/python
      pytest -v tests/test_{{feature_name}}.py
    output: "python_test_results"
    timeout: 300
    on_error: "fail"  # STOP if tests fail - human must review and fix

# Usage:
#   amplifier run "execute sdk-implementation.yaml with feature_name='retry' feature_spec='...' workspace_dir='/path/to/sdk'"
#
# This sub-recipe:
# - Implements feature in both TypeScript and Python SDKs
# - Creates comprehensive unit tests
# - Runs tests and STOPS immediately if any test fails
# - No automatic retries - human must review and fix failures
# - Ensures feature parity between SDKs
