name: "sdk-documentation"
description: "Updates SDK documentation for a new feature"
version: "1.0.0"
tags: ["sdk", "documentation", "docs"]

# This sub-recipe updates SDK documentation for a new feature
# Can be run independently for documentation-only updates

context:
  feature_name: ""          # Required: Name of the feature (e.g., "retry-with-backoff")
  feature_spec: ""          # Required: Detailed feature specification
  typescript_implementation: ""  # Required: TypeScript implementation details
  python_implementation: ""      # Required: Python implementation details
  workspace_dir: "/Users/mpaidiparthy/repos/amplifier-sdk/amplifier-sdk"

steps:
  - id: "analyze-documentation-needs"
    agent: "foundation:zen-architect"
    mode: "ANALYZE"
    prompt: |
      Analyze what documentation needs to be updated for the {{feature_name}} feature.
      
      Feature specification: {{feature_spec}}
      
      TypeScript implementation: {{typescript_implementation}}
      Python implementation: {{python_implementation}}
      
      Working directory: {{workspace_dir}}
      
      Review the existing documentation structure and determine:
      1. Which documentation files need to be updated
      2. What new sections or pages need to be created
      3. What code examples should be added
      4. Whether API reference docs need updates
      5. If migration guides or breaking change notes are needed
      
      Provide a structured plan for documentation updates.
    output: "documentation_plan"
    timeout: 600

  - id: "update-typescript-docs"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Update TypeScript SDK documentation for the {{feature_name}} feature.
      
      Documentation plan: {{documentation_plan}}
      Feature specification: {{feature_spec}}
      TypeScript implementation: {{typescript_implementation}}
      
      Working directory: {{workspace_dir}}
      
      Requirements:
      - Update or create relevant .md files in docs/
      - Add code examples demonstrating the feature
      - Include API reference documentation
      - Add usage guidelines and best practices
      - Include error handling examples
      - Follow existing documentation style and structure
      - Ensure examples are tested and accurate
      
      Create comprehensive, user-friendly documentation.
    output: "typescript_docs_updates"
    timeout: 900

  - id: "update-python-docs"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Update Python SDK documentation for the {{feature_name}} feature.
      
      Documentation plan: {{documentation_plan}}
      Feature specification: {{feature_spec}}
      Python implementation: {{python_implementation}}
      
      Working directory: {{workspace_dir}}
      
      Requirements:
      - Update or create relevant .md files in docs/
      - Add Python code examples demonstrating the feature
      - Include API reference documentation
      - Add usage guidelines and best practices
      - Include error handling examples
      - Ensure parity with TypeScript documentation
      - Follow existing documentation style and structure
      - Ensure examples are tested and accurate
      
      Create comprehensive, user-friendly documentation.
    output: "python_docs_updates"
    timeout: 900

  - id: "update-readme"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Update the main README.md if needed for the {{feature_name}} feature.
      
      Feature specification: {{feature_spec}}
      Documentation plan: {{documentation_plan}}
      
      Working directory: {{workspace_dir}}
      
      Determine if the README needs updates:
      - Is this a significant feature that should be highlighted?
      - Should it be added to the features list?
      - Does the quick start guide need updating?
      
      If updates are needed, make them concise and impactful.
      If no updates needed, document why.
    output: "readme_updates"
    timeout: 300

  - id: "verify-documentation"
    agent: "foundation:zen-architect"
    mode: "ANALYZE"
    prompt: |
      Verify that all documentation is complete, accurate, and consistent.
      
      Feature: {{feature_name}}
      Documentation plan: {{documentation_plan}}
      TypeScript docs: {{typescript_docs_updates}}
      Python docs: {{python_docs_updates}}
      README updates: {{readme_updates}}
      
      Check:
      1. All planned documentation is complete
      2. Code examples are accurate and runnable
      3. Documentation is consistent between TypeScript and Python
      4. No broken links or references
      5. Writing is clear and follows style guide
      
      Provide a verification report with any issues found.
    output: "documentation_verification"
    timeout: 300

# Usage:
#   amplifier run "execute sdk-documentation.yaml with feature_name='retry' feature_spec='...' typescript_implementation='...' python_implementation='...'"
#
# This sub-recipe:
# - Analyzes documentation needs
# - Updates TypeScript SDK documentation
# - Updates Python SDK documentation
# - Updates README if needed
# - Verifies documentation completeness and accuracy
